server {
    listen       3999;
    server_name  _;

    # Vue static files
    root   /usr/share/nginx/html;
    index  index.html;

    # Frontend SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/ {
        # Backend uses network_mode: host → accessible via localhost
        proxy_pass http://127.0.0.1:3998;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 15s;
    }

    # Export endpoints: streaming download with zero buffering.
    # proxy_buffering off → bytes flow to browser immediately (no nginx buffer).
    # gzip on + gzip_proxied any → compress proxied JSON 5–10× on the fly.
    #   nginx uses chunked gzip so each chunk is compressed independently;
    #   the stream stays live end-to-end.
    # proxy_read_timeout 0 → no timeout; export may take many minutes.
    location ~ ^/api/ports/\d+/export$ {
        proxy_pass http://127.0.0.1:3998;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 0;
        proxy_connect_timeout 15s;
        proxy_buffering off;
        gzip on;
        gzip_proxied any;
        gzip_types application/json;
        gzip_min_length 1024;
        gzip_comp_level 2;
    }
}
