server {
    listen       3999;
    server_name  _;

    # Vue static files
    root   /usr/share/nginx/html;
    index  index.html;

    # Frontend SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/ {
        # Backend uses network_mode: host → accessible via localhost
        proxy_pass http://127.0.0.1:3998;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 15s;
    }

    # Export endpoints: no read timeout (data is streamed continuously;
    # the timer resets on every chunk).  A hung connection will eventually
    # be cleaned up by the OS TCP keepalive / client disconnect.
    location ~ ^/api/ports/\d+/export$ {
        proxy_pass http://127.0.0.1:3998;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 0;
        proxy_connect_timeout 15s;
    }
}
